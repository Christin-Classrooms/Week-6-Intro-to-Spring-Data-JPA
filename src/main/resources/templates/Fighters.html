<!doctype html>
<html
	lang="en"
	xmlns:th="http://www.thymeleaf.org"
>
	<head>
		<meta charset="UTF-8" />
		<title>Fighters</title>
		<div th:insert="fragments/base :: assetsHead"></div>
	</head>
	<body>
		<nav th:replace="fragments/navbar :: navbar"></nav>

		<div class="app-container">
			<div class="app-header text-center">
				<h2>Fighters</h2>
				<p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
			</div>

			<!-- SEARCH AND FILTER FORM -->
             <!-- PARDON THE EXTRA VERT SPACING, GOT TO LOOK AT MY prettier SHALTF-->
			<div class="players-card mb-3">
				<form
					th:action="@{/fighters}"
					method="get"
				>
					<div class="d-flex gap-2 flex-wrap align-items-center">
						<input
							type="text"
							name="search"
							class="form-control w-auto"
							placeholder="Search fighters..."
							th:value="${search}"
						/>

						<select
							name="filterType"
							class="form-select w-auto"
						>
							<option
								value="name"
								th:selected="${filterType == 'name'}"
							>
								By Name
							</option>
							<option
								value="health"
								th:selected="${filterType == 'health'}"
							>
								By Health
							</option>
							<option
								value="strongest"
								th:selected="${filterType == 'strongest'}"
							>
								Strongest
							</option>
							<option
								value="balanced"
								th:selected="${filterType == 'balanced'}"
							>
								Balanced
							</option>
						</select>

						<!-- PRESERVE SORT STATE ACROSS SEARCHES -->
						<input
							type="hidden"
							name="sort"
							th:value="${sort}"
						/>
						<input
							type="hidden"
							name="direction"
							th:value="${direction}"
						/>
						<input
							type="hidden"
							name="size"
							th:value="${pageSize}"
						/>

						<button
							type="submit"
							class="btn btn-primary"
						>
							Search
						</button>
						<!-- SHOW ALL: THE "I GIVE UP FILTERING" BUTTON -->
						<a
							th:href="@{/fighters}"
							class="btn btn-outline-success"
							>Show All</a
						>
					</div>
				</form>
			</div>

			<div class="players-card">
				<div class="table-responsive">
					<table class="table align-middle">
						<thead>
							<tr>
								<th scope="col">#</th>

								<!-- SORTABLE HEADERS -->
								<th scope="col">
									<a
										th:href="@{/fighters(page=0,size=${pageSize},sort='name',direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}"
										class="text-decoration-none text-dark fw-bold"
									>
										Name
										<span
											th:if="${sort == 'name'}"
											th:text="${direction == 'ASC' ? '↑' : '↓'}"
										></span>
									</a>
								</th>
								<th scope="col">
									<a
										th:href="@{/fighters(page=0,size=${pageSize},sort='health',direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}"
										class="text-decoration-none text-dark fw-bold"
									>
										Health
										<span
											th:if="${sort == 'health'}"
											th:text="${direction == 'ASC' ? '↑' : '↓'}"
										></span>
									</a>
								</th>
								<th scope="col">
									<a
										th:href="@{/fighters(page=0,size=${pageSize},sort='damage',direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}"
										class="text-decoration-none text-dark fw-bold"
									>
										Damage
										<span
											th:if="${sort == 'damage'}"
											th:text="${direction == 'ASC' ? '↑' : '↓'}"
										></span>
									</a>
								</th>
								<th scope="col">
									<a
										th:href="@{/fighters(page=0,size=${pageSize},sort='resistance',direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}"
										class="text-decoration-none text-dark fw-bold"
									>
										Resistance
										<span
											th:if="${sort == 'resistance'}"
											th:text="${direction == 'ASC' ? '↑' : '↓'}"
										></span>
									</a>
								</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="fighter,itr : ${fighters}">
								<th
									scope="row"
									th:text="${currentPage * pageSize + itr.count}"
								>
									1
								</th>
								<td th:text="${fighter.name}">Fighter Name</td>
								<td th:text="${fighter.health}">1000</td>
								<td th:text="${fighter.damage}">50.0</td>
								<td th:text="${fighter.resistance}">5.0</td>
							</tr>
							<!-- NO FIGHTERS FOUND -->
							<tr th:if="${#lists.isEmpty(fighters)}">
								<td
									colspan="5"
									class="text-center text-muted py-3"
								>
									No fighters found. Have you tried turning it off and on again?
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>

			<!-- PAGINATION CONTROLS -->
			<div
				class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2"
				th:if="${totalPages > 0}"
			>
				<div>
					<span class="text-muted"> Page <strong th:text="${currentPage + 1}">1</strong> of <strong th:text="${totalPages}">1</strong> </span>
				</div>
				<div class="d-flex gap-1 flex-wrap">
					<a
						th:href="@{/fighters(page=0,size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
						class="btn btn-outline-secondary btn-sm"
						th:classappend="${!hasPrevious ? ' disabled' : ''}"
						>« First</a
					>

					<a
						th:href="@{/fighters(page=${currentPage - 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
						class="btn btn-outline-secondary btn-sm"
						th:classappend="${!hasPrevious ? ' disabled' : ''}"
						>‹ Prev</a
					>

					<th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
						<a
							th:href="@{/fighters(page=${i},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
							class="btn btn-sm"
							th:classappend="${i == currentPage ? ' btn-primary' : ' btn-outline-secondary'}"
							th:text="${i + 1}"
							>1</a
						>
					</th:block>

					<a
						th:href="@{/fighters(page=${currentPage + 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
						class="btn btn-outline-secondary btn-sm"
						th:classappend="${!hasNext ? ' disabled' : ''}"
						>Next ›</a
					>

					<a
						th:href="@{/fighters(page=${totalPages - 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
						class="btn btn-outline-secondary btn-sm"
						th:classappend="${!hasNext ? ' disabled' : ''}"
						>Last »</a
					>
				</div>
			</div>

			<div class="mt-3">
				<a
					href="/create-fighter"
					class="btn btn-primary"
					>Register New Fighter</a
				>
			</div>
		</div>

		<div th:insert="fragments/base :: assetsScripts"></div>
	</body>
</html>
