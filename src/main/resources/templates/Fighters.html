<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4">
    <h2>Registered Fighters</h2>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Health</th>
            <th>Damage</th>
            <th>Resistance</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${fighters}">
            <td th:text="${f.name}"></td>
            <td th:text="${f.health}"></td>
            <td th:text="${f.damage}"></td>
            <td th:text="${f.resistance}"></td>
        </tr>
        </tbody>
    </table>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
