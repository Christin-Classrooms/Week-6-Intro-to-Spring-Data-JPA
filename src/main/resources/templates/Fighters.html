<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
  </head>
  <body>
    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="app-container">
      <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">
          Showing <span th:text="${totalElements}">0</span> fighters
        </p>
      </div>

      <div class="players-card mb-3">
        <form
          class="d-flex flex-wrap gap-2 p-3"
          method="get"
          th:action="@{/fighters}"
        >
          <input
            class="form-control"
            style="max-width: 260px"
            type="text"
            name="search"
            placeholder="Search by name..."
            th:value="${search}"
          />

          <select
            class="form-select"
            style="max-width: 220px"
            name="filterType"
          >
            <option value="all" th:selected="${filterType == 'all'}">
              All
            </option>
            <option value="name" th:selected="${filterType == 'name'}">
              By Name
            </option>
            <option value="health" th:selected="${filterType == 'health'}">
              By Health (&gt;1200)
            </option>
            <option
              value="strongest"
              th:selected="${filterType == 'strongest'}"
            >
              Strongest
            </option>
            <option value="balanced" th:selected="${filterType == 'balanced'}">
              Balanced
            </option>
          </select>

          <!-- keep sort + direction + size when searching -->
          <input type="hidden" name="sort" th:value="${sort}" />
          <input type="hidden" name="direction" th:value="${direction}" />
          <input type="hidden" name="size" th:value="${pageSize}" />

          <button class="btn btn-primary" type="submit">Search</button>
          <a class="btn btn-secondary" th:href="@{/fighters}">Clear</a>
        </form>
      </div>

      <div class="players-card">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th scope="col">#</th>

                <th scope="col">
                  <a
                    th:href="@{/fighters(page=0,size=${pageSize},sort='name',
            direction=${sort=='name' and direction=='ASC' ? 'DESC' : 'ASC'},
            search=${search},filterType=${filterType})}"
                  >
                    Name
                    <span
                      th:if="${sort=='name'}"
                      th:text="${direction=='ASC' ? '↑' : '↓'}"
                    ></span>
                  </a>
                </th>

                <th scope="col">
                  <a
                    th:href="@{/fighters(page=0,size=${pageSize},sort='health',
            direction=${sort=='health' and direction=='ASC' ? 'DESC' : 'ASC'},
            search=${search},filterType=${filterType})}"
                  >
                    Health
                    <span
                      th:if="${sort=='health'}"
                      th:text="${direction=='ASC' ? '↑' : '↓'}"
                    ></span>
                  </a>
                </th>

                <th scope="col">
                  <a
                    th:href="@{/fighters(page=0,size=${pageSize},sort='damage',
            direction=${sort=='damage' and direction=='ASC' ? 'DESC' : 'ASC'},
            search=${search},filterType=${filterType})}"
                  >
                    Damage
                    <span
                      th:if="${sort=='damage'}"
                      th:text="${direction=='ASC' ? '↑' : '↓'}"
                    ></span>
                  </a>
                </th>

                <th scope="col">
                  <a
                    th:href="@{/fighters(page=0,size=${pageSize},sort='resistance',
            direction=${sort=='resistance' and direction=='ASC' ? 'DESC' : 'ASC'},
            search=${search},filterType=${filterType})}"
                  >
                    Resistance
                    <span
                      th:if="${sort=='resistance'}"
                      th:text="${direction=='ASC' ? '↑' : '↓'}"
                    ></span>
                  </a>
                </th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="fighter,itr : ${fighters}">
                <th scope="row" th:text="${itr.count}">1</th>
                <td th:text="${fighter.name}">Fighter Name</td>
                <td th:text="${fighter.health}">1000</td>
                <td th:text="${fighter.damage}">50.0</td>
                <td th:text="${fighter.resistance}">5.0</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <!-- Pagination Controls -->
<div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
    <p class="text-muted mb-0">
        Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
    </p>

    <nav>
        <ul class="pagination mb-0">

            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=0,size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                    First
                </a>
            </li>

            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${currentPage-1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i==currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/fighters(page=${i},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                </a>
            </li>

            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${currentPage+1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                    Next
                </a>
            </li>

            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${totalPages-1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                    Last
                </a>
            </li>

        </ul>
    </nav>
</div>
      <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary"
          >Register New Fighter</a
        >
      </div>
    </div>

    <div th:insert="fragments/base :: assetsScripts"></div>
  </body>
</html>
