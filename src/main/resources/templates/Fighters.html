<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
    </div>

    <div class="players-card">

        <!-- Filter Form -->
        <form th:action="@{/fighters}" method="get" class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text"
                       class="form-control"
                       name="search"
                       placeholder="Search by value"
                       th:value="${search}">
            </div>

            <div class="col-md-3">
                <select name="filterType" class="form-select">
                    <option value="" th:selected="${filterType == null or filterType == ''}">All</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name (e.g: Bruce)</option>
                    <option value="health" th:selected="${filterType == 'health'}">By Health (e.g: 1200)</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced (e.g: Health, Damage)</option>
                </select>
            </div>

            <div class="col-md-2">
                <input type="hidden" name="sort" th:value="${sort}">
                <input type="hidden" name="direction" th:value="${direction}">
                <input type="hidden" name="size" th:value="${pageSize}">
                <button type="submit" class="btn btn-primary w-100">Search</button>
            </div>

            <div class="col-md-2">
                <a th:href="@{/fighters}" class="btn btn-outline-secondary w-100">Clear</a>
            </div>
        </form>

        <!-- Fighters Table -->
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=0,
                            size=${pageSize},
                            search=${search},
                            filterType=${filterType},
                            sort='name',
                            direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'}
                        )}" class="text-decoration-none text-dark">
                            Name
                            <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=0,
                            size=${pageSize},
                            search=${search},
                            filterType=${filterType},
                            sort='health',
                            direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'}
                        )}" class="text-decoration-none text-dark">
                            Health
                            <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=0,
                            size=${pageSize},
                            search=${search},
                            filterType=${filterType},
                            sort='damage',
                            direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'}
                        )}" class="text-decoration-none text-dark">
                            Damage
                            <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=0,
                            size=${pageSize},
                            search=${search},
                            filterType=${filterType},
                            sort='resistance',
                            direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'}
                        )}" class="text-decoration-none text-dark">
                            Resistance
                            <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="fighter, itr : ${fighters}">
                    <th scope="row" th:text="${itr.count + (currentPage * pageSize)}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>

                <tr th:if="${#lists.isEmpty(fighters)}">
                    <td colspan="5" class="text-center text-muted">No fighters found</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2" th:if="${totalPages > 0}">
            <div>
                <span class="text-muted">
                    Page <span th:text="${currentPage + 1}">1</span> of
                    <span th:text="${totalPages}">1</span>
                </span>
            </div>

            <div class="btn-group" role="group">
                <a th:href="@{/fighters(
                    page=0,
                    size=${pageSize},
                    search=${search},
                    filterType=${filterType},
                    sort=${sort},
                    direction=${direction}
                )}"
                   class="btn btn-outline-primary"
                   th:classappend="${!hasPrevious} ? ' disabled'">First</a>

                <a th:href="@{/fighters(
                    page=${currentPage - 1},
                    size=${pageSize},
                    search=${search},
                    filterType=${filterType},
                    sort=${sort},
                    direction=${direction}
                )}"
                   class="btn btn-outline-primary"
                   th:classappend="${!hasPrevious} ? ' disabled'">Previous</a>

                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/fighters(
                        page=${i},
                        size=${pageSize},
                        search=${search},
                        filterType=${filterType},
                        sort=${sort},
                        direction=${direction}
                    )}"
                   class="btn btn-outline-primary"
                   th:classappend="${i == currentPage} ? ' active'">
                    <span th:text="${i + 1}">1</span>
                </a>

                <a th:href="@{/fighters(
                    page=${currentPage + 1},
                    size=${pageSize},
                    search=${search},
                    filterType=${filterType},
                    sort=${sort},
                    direction=${direction}
                )}"
                   class="btn btn-outline-primary"
                   th:classappend="${!hasNext} ? ' disabled'">Next</a>

                <a th:href="@{/fighters(
                    page=${totalPages - 1},
                    size=${pageSize},
                    search=${search},
                    filterType=${filterType},
                    sort=${sort},
                    direction=${direction}
                )}"
                   class="btn btn-outline-primary"
                   th:classappend="${!hasNext} ? ' disabled'">Last</a>
            </div>
        </div>
    </div>

    <div class="mt-3 text-end">
        <a th:href="@{/create-fighter}" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
