<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fighters</title>

    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ccc;
            padding:8px;
            text-align:left;
        }

        th a{
            text-decoration:none;
            color:black;
            cursor:pointer;
        }

        th a:hover{
            text-decoration:underline;
        }

        .pagination a{
            margin:4px;
            text-decoration:none;
        }

        .pagination strong{
            margin:4px;
        }
    </style>

</head>
<body>

<h1>Fighters</h1>

<a href="/create-fighter">Create Fighter</a>

<hr>

<!-- SEARCH / FILTER FORM -->

<form method="get" action="/fighters">

    Search Name:
    <input type="text" name="search" th:value="${search}">

    Filter Type:
    <select name="filterType">
        <option value="all" th:selected="${filterType == 'all'}">All</option>
        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
        <option value="health" th:selected="${filterType == 'health'}">By Health</option>
        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest Fighters</option>
        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced Fighters</option>
    </select>

    <button type="submit">Search</button>

    <a href="/fighters">Clear</a>

</form>

<hr>

<!-- FIGHTER TABLE -->

<table>

<thead>

<tr>

<th>ID</th>

<th>
<a th:href="@{/fighters(
page=0,
size=${pageSize},
sort='name',
direction=${sort=='name' and direction=='ASC' ? 'DESC':'ASC'},
search=${search},
filterType=${filterType}
)}">
Name
<span th:if="${sort=='name'}"
th:text="${direction=='ASC' ? '↑':'↓'}"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(
page=0,
size=${pageSize},
sort='health',
direction=${sort=='health' and direction=='ASC' ? 'DESC':'ASC'},
search=${search},
filterType=${filterType}
)}">
Health
<span th:if="${sort=='health'}"
th:text="${direction=='ASC' ? '↑':'↓'}"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(
page=0,
size=${pageSize},
sort='damage',
direction=${sort=='damage' and direction=='ASC' ? 'DESC':'ASC'},
search=${search},
filterType=${filterType}
)}">
Damage
<span th:if="${sort=='damage'}"
th:text="${direction=='ASC' ? '↑':'↓'}"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(
page=0,
size=${pageSize},
sort='resistance',
direction=${sort=='resistance' and direction=='ASC' ? 'DESC':'ASC'},
search=${search},
filterType=${filterType}
)}">
Resistance
<span th:if="${sort=='resistance'}"
th:text="${direction=='ASC' ? '↑':'↓'}"></span>
</a>
</th>

</tr>

</thead>


<tbody>

<tr th:each="fighter : ${fighters}">

<td th:text="${fighter.id}"></td>

<td th:text="${fighter.name}"></td>

<td th:text="${fighter.health}"></td>

<td th:text="${fighter.damage}"></td>

<td th:text="${fighter.resistance}"></td>

</tr>

</tbody>

</table>

<hr>

<!-- PAGINATION -->

<div class="pagination">

<span th:text="'Page ' + (${currentPage}+1) + ' of ' + ${totalPages}"></span>

<br><br>

<a th:if="${hasPrevious}"
th:href="@{/fighters(
page=0,
size=${pageSize},
sort=${sort},
direction=${direction},
search=${search},
filterType=${filterType}
)}">First</a>


<a th:if="${hasPrevious}"
th:href="@{/fighters(
page=${currentPage-1},
size=${pageSize},
sort=${sort},
direction=${direction},
search=${search},
filterType=${filterType}
)}">Previous</a>


<span th:each="i : ${#numbers.sequence(0,totalPages-1)}">

<a th:if="${i != currentPage}"
th:href="@{/fighters(
page=${i},
size=${pageSize},
sort=${sort},
direction=${direction},
search=${search},
filterType=${filterType}
)}"
th:text="${i+1}"></a>

<strong th:if="${i == currentPage}"
th:text="${i+1}"></strong>

</span>


<a th:if="${hasNext}"
th:href="@{/fighters(
page=${currentPage+1},
size=${pageSize},
sort=${sort},
direction=${direction},
search=${search},
filterType=${filterType}
)}">Next</a>


<a th:if="${hasNext}"
th:href="@{/fighters(
page=${totalPages-1},
size=${pageSize},
sort=${sort},
direction=${direction},
search=${search},
filterType=${filterType}
)}">Last</a>

</div>

</body>
</html>
