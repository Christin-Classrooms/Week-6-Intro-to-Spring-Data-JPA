<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighter Form</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2 th:text="${fighter.id} ? 'Edit Fighter' : 'Register New Fighter'">Fighter Form</h2>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/fighters/save}" th:object="${fighter}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           id="name" th:field="*{name}" placeholder="Enter fighter name">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">Name error</div>
                </div>

                <div class="mb-3">
                    <label for="health" class="form-label">Health (1001-1499)</label>
                    <input type="number" class="form-control"
                           th:classappend="${#fields.hasErrors('health')} ? 'is-invalid'"
                           id="health" th:field="*{health}" placeholder="Enter health">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('health')}"
                         th:errors="*{health}">Health error</div>
                </div>

                <div class="mb-3">
                    <label for="damage" class="form-label">Damage (0-99.99)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:classappend="${#fields.hasErrors('damage')} ? 'is-invalid'"
                           id="damage" th:field="*{damage}" placeholder="Enter damage">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('damage')}"
                         th:errors="*{damage}">Damage error</div>
                </div>

                <div class="mb-3">
                    <label for="resistance" class="form-label">Resistance (0-10)</label>
                    <input type="number" step="0.1" class="form-control"
                           th:classappend="${#fields.hasErrors('resistance')} ? 'is-invalid'"
                           id="resistance" th:field="*{resistance}" placeholder="Enter resistance">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('resistance')}"
                         th:errors="*{resistance}">Resistance error</div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Save Fighter</button>
                    <a href="/fighters" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
