<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighters</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>⚔️ Fighter Roster</h2>
        <a th:href="@{/create-fighter}" class="btn btn-dark">+ Register New Fighter</a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(fighters)}" class="alert alert-info text-center">
        No fighters registered yet. <a th:href="@{/create-fighter}">Register the first one!</a>
    </div>

    <!-- Fighters Table -->
    <div th:unless="${#lists.isEmpty(fighters)}">
        <div class="card shadow">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Health</th>
                        <th>Damage</th>
                        <th>Resistance</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="fighter, iterStat : ${fighters}">
                        <td th:text="${iterStat.count}"></td>
                        <td th:text="${fighter.name}"></td>
                        <td>
                            <span class="badge bg-success" th:text="${fighter.health}"></span>
                        </td>
                        <td>
                            <span class="badge bg-danger" th:text="${fighter.damage}"></span>
                        </td>
                        <td th:text="${fighter.resistance}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <p class="text-muted mt-2">Total fighters: <strong th:text="${#lists.size(fighters)}"></strong></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
